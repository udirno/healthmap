version: "3.8"

services:
  # PostgreSQL with PostGIS
  postgres:
    image: postgis/postgis:15-3.3
    container_name: healthmap_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-healthmap_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-healthmap_password}
      POSTGRES_DB: ${POSTGRES_DB:-healthmap_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - healthmap_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthmap_user -d healthmap_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: healthmap_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - healthmap_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthmap_backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - healthmap_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: healthmap_frontend
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - healthmap_network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  healthmap_network:
    driver: bridge
