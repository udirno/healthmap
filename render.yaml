services:
  # Backend API
  - type: web
    name: healthmap-api
    env: docker
    region: oregon
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: healthmap-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: healthmap-redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DEBUG
        value: false
    healthCheckPath: /health

  # Redis
  - type: redis
    name: healthmap-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  # PostgreSQL
  - name: healthmap-db
    plan: free
    region: oregon
    databaseName: healthmap_db
    user: healthmap_user
